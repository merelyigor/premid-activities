name: Release PreMiD Activities

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v1.0.0
        required: true
        default: v1.0.0
      title:
        description: Release title
        required: true
        default: v1.0.0
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Build release ZIP files
        shell: bash
        run: |
          chmod +x ./scripts/build.sh
          ./scripts/build.sh

      - name: Write release notes
        shell: bash
        run: |
          printf '%s\n' \
            '## PreMiD Activities' \
            '' \
            'Ready-to-install PreMiD activity ZIP files:' \
            '' \
            '- AniTube.zip for anitube.in.ua' \
            '- UAKino.zip for uakino.best' \
            '' \
            'Author: Merelyigor' \
            > release-notes.md

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
          RELEASE_TITLE: ${{ github.event.inputs.title || github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/*.zip --clobber
          else
            gh release create "$RELEASE_TAG" dist/*.zip \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TITLE" \
              --notes-file release-notes.md
          fi
